name: Terraform Enterprise Pipeline

on:
  push:
    branches:
      - main
      - feature/terraform-infra
  pull_request:
    branches:
      - main

jobs:

  # =========================
  # PLAN STAGE (DEV)
  # =========================
  plan:
    name: Plan (Dev)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform Init (Dev Backend)
        run: terraform init -backend-config="key=env/dev/terraform.tfstate"

      - run: terraform fmt -check -recursive
      - run: terraform validate

      - uses: terraform-linters/setup-tflint@v4
      - run: tflint

      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          skip_check: CKV_AWS_144,CKV2_AWS_62,CKV_AWS_18,CKV_AWS_145

      - run: terraform plan -var-file=environments/dev.tfvars


  # =========================
  # APPLY DEV
  # =========================
  apply-dev:
    name: Deploy Dev
    runs-on: ubuntu-latest
    needs: plan
    environment: dev

    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform Init (Dev Backend)
        run: terraform init -backend-config="key=env/dev/terraform.tfstate"

      - run: terraform fmt -check -recursive
      - run: terraform validate

      - uses: terraform-linters/setup-tflint@v4
      - run: tflint

      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          skip_check: CKV_AWS_144,CKV2_AWS_62,CKV_AWS_18,CKV_AWS_145

      - name: Terraform Apply Dev
        run: terraform apply -auto-approve -var-file=environments/dev.tfvars


  # =========================
  # APPLY STAGING
  # =========================
  apply-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: apply-dev
    environment: staging

    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform Init (Staging Backend)
        run: terraform init -backend-config="key=env/staging/terraform.tfstate"

      - run: terraform fmt -check -recursive
      - run: terraform validate

      - uses: terraform-linters/setup-tflint@v4
      - run: tflint

      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          skip_check: CKV_AWS_144,CKV2_AWS_62,CKV_AWS_18,CKV_AWS_145

      - name: Terraform Apply Staging
        run: terraform apply -auto-approve -var-file=environments/staging.tfvars


  # =========================
  # APPLY PROD (FINAL FIXED)
  # =========================
  apply-prod:
    name: Deploy Prod
    runs-on: ubuntu-latest
    needs: apply-staging
    environment: prod   # 🔥 approval gate

    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform Init (Prod Backend)
        run: terraform init -backend-config="key=env/prod/terraform.tfstate"

      # 🔥 IMPORT FIX (CRITICAL)
      - name: Import IAM Role (if exists)
        run: |
          terraform import module.ec2.aws_iam_role.ec2_role ec2s3-project-prod-role || true

      - name: Import S3 Bucket (if exists)
        run: |
          terraform import module.s3.aws_s3_bucket.app_bucket ec2s3-prod-dinesh-001 || true

      # 🔐 DevSecOps checks
      - run: terraform fmt -check -recursive
      - run: terraform validate

      - uses: terraform-linters/setup-tflint@v4
      - run: tflint

      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          skip_check: CKV_AWS_144,CKV2_AWS_62,CKV_AWS_18,CKV_AWS_145

      # 🚀 APPLY
      - name: Terraform Apply Prod
        run: terraform apply -auto-approve -var-file=environments/prod.tfvars