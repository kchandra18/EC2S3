name: Terraform Enterprise Pipeline

on:
  push:
    branches:
      - main
      - feature/terraform-infra
  pull_request:
    branches:
      - main

jobs:

  # =========================
  # PLAN (DEV)
  # =========================
  plan:
    name: Plan (Dev)
    runs-on: ubuntu-latest

    env:
      TF_INPUT: false

    steps:
      - uses: actions/checkout@v4

      - name: Cache Terraform
        uses: actions/cache@v4
        with:
          path: |
            ~/.terraform.d/plugin-cache
            .terraform
          key: terraform-${{ runner.os }}-${{ hashFiles('**/*.tf') }}
          restore-keys: |
            terraform-${{ runner.os }}-

      - uses: hashicorp/setup-terraform@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform Init (Dev Backend)
        run: terraform init -reconfigure -backend-config="key=env/dev/terraform.tfstate"

      - run: terraform fmt -check -recursive
      - run: terraform validate

      - uses: terraform-linters/setup-tflint@v4
      - run: tflint

      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          skip_check: CKV_AWS_144,CKV2_AWS_62,CKV_AWS_18,CKV_AWS_145

      - name: Terraform Plan
        run: terraform plan -var-file=environments/dev.tfvars


  # =========================
  # APPLY DEV
  # =========================
  apply-dev:
    name: Deploy Dev
    runs-on: ubuntu-latest
    needs: plan
    environment: dev

    env:
      TF_INPUT: false

    steps:
      - uses: actions/checkout@v4

      - name: Cache Terraform
        uses: actions/cache@v4
        with:
          path: |
            ~/.terraform.d/plugin-cache
            .terraform
          key: terraform-${{ runner.os }}-${{ hashFiles('**/*.tf') }}
          restore-keys: |
            terraform-${{ runner.os }}-

      - uses: hashicorp/setup-terraform@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform Init (Dev Backend)
        run: terraform init -reconfigure -backend-config="key=env/dev/terraform.tfstate"

      - run: terraform fmt -check -recursive
      - run: terraform validate

      - uses: terraform-linters/setup-tflint@v4
      - run: tflint

      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          skip_check: CKV_AWS_144,CKV2_AWS_62,CKV_AWS_18,CKV_AWS_145

      - name: Terraform Apply Dev
        run: terraform apply -auto-approve -var-file=environments/dev.tfvars


  # =========================
  # APPLY STAGING
  # =========================
  apply-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: apply-dev
    environment: staging

    env:
      TF_INPUT: false

    steps:
      - uses: actions/checkout@v4

      - name: Cache Terraform
        uses: actions/cache@v4
        with:
          path: |
            ~/.terraform.d/plugin-cache
            .terraform
          key: terraform-${{ runner.os }}-${{ hashFiles('**/*.tf') }}
          restore-keys: |
            terraform-${{ runner.os }}-

      - uses: hashicorp/setup-terraform@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform Init (Staging Backend)
        run: terraform init -reconfigure -backend-config="key=env/staging/terraform.tfstate"

      - run: terraform fmt -check -recursive
      - run: terraform validate

      - uses: terraform-linters/setup-tflint@v4
      - run: tflint

      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          skip_check: CKV_AWS_144,CKV2_AWS_62,CKV_AWS_18,CKV_AWS_145

      - name: Terraform Apply Staging
        run: terraform apply -auto-approve -var-file=environments/staging.tfvars


  # =========================
  # APPLY PROD
  # =========================
  apply-prod:
    name: Deploy Prod
    runs-on: ubuntu-latest
    needs: apply-staging
    environment: prod

    env:
      TF_INPUT: false

    steps:
      - uses: actions/checkout@v4

      - name: Cache Terraform
        uses: actions/cache@v4
        with:
          path: |
            ~/.terraform.d/plugin-cache
            .terraform
          key: terraform-${{ runner.os }}-${{ hashFiles('**/*.tf') }}
          restore-keys: |
            terraform-${{ runner.os }}-

      - uses: hashicorp/setup-terraform@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform Init (Prod Backend)
        run: terraform init -reconfigure -backend-config="key=env/prod/terraform.tfstate"

      # ✅ FINAL FIX: import with var-file
      - name: Import IAM Role (if exists)
        run: |
          terraform import -var-file=environments/prod.tfvars module.ec2.aws_iam_role.ec2_role ec2s3-project-prod-role || true

      - name: Import S3 Bucket (if exists)
        run: |
          terraform import -var-file=environments/prod.tfvars module.s3.aws_s3_bucket.app_bucket ec2s3-prod-dinesh-001 || true

      - run: terraform fmt -check -recursive
      - run: terraform validate

      - uses: terraform-linters/setup-tflint@v4
      - run: tflint

      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          skip_check: CKV_AWS_144,CKV2_AWS_62,CKV_AWS_18,CKV_AWS_145

      - name: Terraform Apply Prod
        run: terraform apply -auto-approve -var-file=environments/prod.tfvars