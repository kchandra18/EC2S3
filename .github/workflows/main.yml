name: Terraform Full Auto Pipeline

on:
  push:
    branches:
      - main
      - feature/terraform-infra

env:
  AWS_REGION: us-east-1

jobs:

# =========================
# CI (ALWAYS RUNS)
# =========================
  ci:
    name: CI - Validate & Plan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Format
        run: terraform fmt -check -recursive

      - name: Terraform Init (no backend)
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan (Dev)
        run: |
          terraform init -backend-config="key=env/dev/terraform.tfstate" -reconfigure
          terraform plan -var-file=environments/dev.tfvars


# =========================
# DEPLOY DEV
# =========================
  deploy-dev:
    name: Deploy Dev
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - run: terraform init -backend-config="key=env/dev/terraform.tfstate" -reconfigure
      - run: terraform apply -auto-approve -var-file=environments/dev.tfvars


# =========================
# DEPLOY STAGING
# =========================
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: deploy-dev

    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - run: terraform init -backend-config="key=env/staging/terraform.tfstate" -reconfigure
      - run: terraform apply -auto-approve -var-file=environments/staging.tfvars


# =========================
# DEPLOY PROD (AUTO)
# =========================
  deploy-prod:
    name: Deploy Prod
    runs-on: ubuntu-latest
    needs: deploy-staging

    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - run: terraform init -backend-config="key=env/prod/terraform.tfstate" -reconfigure

      - run: terraform apply -auto-approve -lock-timeout=300s -var-file=environments/prod.tfvars