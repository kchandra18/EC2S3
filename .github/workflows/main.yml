name: Terraform Full Auto Pipeline

on:
  push:
    branches:
      - main
      - feature/terraform-infra

env:
  AWS_REGION: us-east-1

jobs:

# =========================
# CI STAGE (NO AWS AT ALL)
# =========================
  ci:
    name: CI - Validate Only
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      # Disable backend
      - name: Disable Backend
        run: mv backend.tf backend.tf.disabled

      - name: Terraform Format
        run: terraform fmt -check -recursive

      - name: Terraform Init (Local)
        run: terraform init

      - name: Terraform Validate
        run: terraform validate


# =========================
# DEPLOY DEV
# =========================
  deploy-dev:
    name: Deploy Dev
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init (Dev)
        run: terraform init -backend-config="key=env/dev/terraform.tfstate" -reconfigure

      - name: Terraform Plan (Dev)
        run: terraform plan -var-file=environments/dev.tfvars

      - name: Terraform Apply (Dev)
        run: terraform apply -auto-approve -lock-timeout=300s -var-file=environments/dev.tfvars


# =========================
# DEPLOY STAGING
# =========================
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: deploy-dev

    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init (Staging)
        run: terraform init -backend-config="key=env/staging/terraform.tfstate" -reconfigure

      - name: Terraform Plan (Staging)
        run: terraform plan -var-file=environments/staging.tfvars

      - name: Terraform Apply (Staging)
        run: terraform apply -auto-approve -lock-timeout=300s -var-file=environments/staging.tfvars


# =========================
# DEPLOY PROD
# =========================
  deploy-prod:
    name: Deploy Prod
    runs-on: ubuntu-latest
    needs: deploy-staging

    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init (Prod)
        run: terraform init -backend-config="key=env/prod/terraform.tfstate" -reconfigure

      - name: Terraform Plan (Prod)
        run: terraform plan -var-file=environments/prod.tfvars

      - name: Terraform Apply (Prod)
        run: terraform apply -auto-approve -lock-timeout=300s -var-file=environments/prod.tfvars