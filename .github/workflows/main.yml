name: Terraform Enterprise Pipeline

on:
  pull_request:
    branches: [main]

  push:
    branches: [main]

env:
  AWS_REGION: us-east-1

jobs:

# =========================
# CI STAGE (PR ONLY)
# =========================
  ci:
    name: CI - Plan & Validate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format
        run: terraform fmt -check -recursive

      - name: Terraform Init (no backend)
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: TFLint
        uses: terraform-linters/setup-tflint@v4
      - run: tflint

      - name: Checkov Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .

      - name: Terraform Plan (Dev)
        run: |
          terraform init -backend-config="key=env/dev/terraform.tfstate" -reconfigure
          terraform plan -var-file=environments/dev.tfvars


# =========================
# DEPLOY DEV
# =========================
  deploy-dev:
    name: CD - Deploy Dev
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init (Dev)
        run: terraform init -backend-config="key=env/dev/terraform.tfstate" -reconfigure

      - name: Terraform Apply (Dev)
        run: terraform apply -auto-approve -var-file=environments/dev.tfvars


# =========================
# DEPLOY STAGING
# =========================
  deploy-staging:
    name: CD - Deploy Staging
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: deploy-dev

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init (Staging)
        run: terraform init -backend-config="key=env/staging/terraform.tfstate" -reconfigure

      - name: Terraform Apply (Staging)
        run: terraform apply -auto-approve -var-file=environments/staging.tfvars


# =========================
# DEPLOY PROD (APPROVAL)
# =========================
  deploy-prod:
    name: CD - Deploy Prod
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: deploy-staging

    environment: prod   # 🔐 REQUIRED FOR APPROVAL

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init (Prod)
        run: terraform init -backend-config="key=env/prod/terraform.tfstate" -reconfigure

      # ✅ SAFE IMPORT (NO FAIL)
      - name: Import IAM Role (if not in state)
        run: |
          terraform state list | grep aws_iam_role.ec2_role || \
          terraform import module.ec2.aws_iam_role.ec2_role ec2s3-project-prod-role || true

      - name: Import Instance Profile (if not in state)
        run: |
          terraform state list | grep aws_iam_instance_profile.ec2_profile || \
          terraform import module.ec2.aws_iam_instance_profile.ec2_profile ec2s3-project-prod-profile || true

      - name: Import S3 Bucket (if not in state)
        run: |
          terraform state list | grep aws_s3_bucket.app_bucket || \
          terraform import module.s3.aws_s3_bucket.app_bucket ec2s3-prod-dinesh-001 || true

      # ✅ APPLY WITH LOCK RETRY
      - name: Terraform Apply (Prod)
        run: |
          terraform apply -auto-approve -lock-timeout=300s -var-file=environments/prod.tfvars